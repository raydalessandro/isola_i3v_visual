<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#1f2a35">
  <title>Isola dei Tre Venti — Catalogo Visual</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Top bar mobile (sticky). Su desktop e' nascosta via CSS. -->
  <header id="topbar" role="banner">
    <button id="menu-toggle"
            type="button"
            aria-label="Apri menu"
            aria-expanded="false"
            aria-controls="sidebar">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </button>
    <h1 id="topbar-title"><a href="#/">Catalogo Visual</a></h1>
    <span id="topbar-count" class="topbar-count" aria-label="Totale entita">—</span>
  </header>

  <!-- Backdrop drawer: sempre nel DOM, controllato solo da body.sidebar-open via CSS. -->
  <div id="sidebar-backdrop" aria-hidden="true"></div>

  <div id="app">
    <aside id="sidebar" aria-label="Navigazione catalogo">
      <div class="sidebar-header">
        <h2 class="sidebar-title"><a href="#/">Catalogo Visual</a></h2>
        <p class="subtitle">L'Isola dei Tre Venti</p>
        <div class="search-wrap">
          <input type="search"
                 id="search"
                 placeholder="Cerca per nome o id…"
                 autocomplete="off"
                 spellcheck="false"
                 aria-label="Cerca entita">
        </div>
      </div>
      <nav id="tree-nav" aria-label="Albero entita"></nav>
      <div class="sidebar-footer">
        <a href="#/strade">Indice strade</a>
        <a href="#/storie">Storie del libro</a>
        <a href="../cartografia/geo/viewer/index.html" target="_blank" rel="noopener">Viewer cartografia</a>
        <p class="meta" id="meta"></p>
      </div>
    </aside>

    <main id="main" tabindex="-1">
      <div id="content"><p class="loading">Caricamento…</p></div>
    </main>
  </div>

  <!-- Lightbox per fullscreen immagini. Nasconde via body.lightbox-open. -->
  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Immagine ingrandita">
    <button class="lb-close" type="button" aria-label="Chiudi (Esc)">&times;</button>
    <a class="lb-download" href="#" download role="button" aria-label="Scarica immagine" title="Scarica immagine">&darr;</a>
    <button class="lb-prev" type="button" aria-label="Precedente">&#10094;</button>
    <button class="lb-next" type="button" aria-label="Successiva">&#10095;</button>
    <div class="lb-stage">
      <img class="lb-img" alt="">
    </div>
    <div class="lb-caption">
      <span class="lb-filename"></span>
      <span class="lb-size"></span>
      <span class="lb-counter"></span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
