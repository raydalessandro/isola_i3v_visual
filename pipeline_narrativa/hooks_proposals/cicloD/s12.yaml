# Hook ciclo D — S12 — Quando i Tre Venti Suonano Insieme
# SIGILLO della saga. Fonte: proposta agente fase G del 2026-04-29.
# Edit minimi:
# - h04 (signature): agente ha auto-corretto in note finali (per quota
#   3 max signature) ma il testo del hook era ancora true -> false.
# - h05 (33->28): condenso frammento Grunto, preservando "Una volta era
#   diverso. Suonavano in tre, erano tre persone." La coda "non tre
#   venti" e' detta visivamente da h08 (Concerto).
# - h08 (36->28): condensata descrizione tre venti.
# - h09 (33->27): "Pochi secondi dopo... Pochi secondi dopo" -> "Poco
#   dopo... Poi"
# - h10 (34->27): condensato finale Fiamma a tavola.

story_id: s12

hooks:
  - hook_id: s12_h01
    type: interno
    is_signature: false
    provenance: extended_v2
    moment: alba
    location:
      id: forno
      qualifier: alba_partenza_cornice_apertura_saga
    characters_present: [fiamma, gabriel, elias, noah]
    focal_action: "Fiamma mette in mano a Noah due cornetti caldi e a Gabriel una sacca di tela con la pagnotta. Dice: «Andate. Una è per Grunto.»"
    focal_object: pagnotta_forno
    atmosphere: "forno acceso da ore, fiato bianco dei fratelli sulla soglia, finestra socchiusa già lasciata da Liù, prima brina fuori sul selciato, modalità ferma di Fiamma — pochi gesti, frasi essenziali"
    palette: "arancione del Forno acceso, terracotta del banco, bianco farina sul grembiule di Fiamma, viola-blu del cielo pre-alba dietro la porta aperta, bianco del fiato, marrone della sacca di tela, oro dei cornetti caldi"
    wind_visible: vento_taglio
    onomatopee: ["frrr"]
    composition_zone: vignette
    notes: "Apertura saga, simmetria S1↔S12. Le due frasi di Fiamma alla lettera (callback s01: «Una è per Grunto.»). Liù appena ripartita — frrr lievissimo in alto-destra, foglia mossa sul davanzale. Sguardo lungo di Fiamma a Gabriel non in questo hook (è in h02) — qui prevale la consegna."

  - hook_id: s12_h02
    type: introspettivo
    is_signature: true
    provenance: extended_v2
    moment: alba
    location:
      id: forno
      qualifier: stipite_porta_uscita_micro_seme_fase_f
    characters_present: [fiamma, gabriel]
    focal_action: "Fiamma sullo stipite si volta. Guarda a lungo Gabriel. Gabriel non si volta, è già un passo fuori. Esce."
    focal_object: null
    atmosphere: "stipite di legno scuro, sguardo lungo che non si trasforma in parola, Gabriel di tre quarti di spalle, primo piano del taglio della spalla, prima luce di est che entra obliqua, cielo dietro che vira al chiaro"
    palette: "arancione tiepido del Forno alle spalle di Fiamma, bordeaux della maglia di Gabriel, grembiule bianco-farina di Fiamma, viola-blu del cielo che si schiarisce, ocra del legno dello stipite, sagome di Elias e Noah già fuori sfocate"
    wind_visible: vento_taglio
    onomatopee: []
    composition_zone: vignette
    notes: "HOOK FIRMA. Micro-seme Fase F (mai dichiarato). Vincolo voce: zero parola, sguardo che resta più del normale. Strato 3 — Fiamma sa che oggi è il giorno di Gabriel, Gabriel non lo sa ancora. Tipografia minima, no didascalia."

  - hook_id: s12_h03
    type: transizione
    is_signature: false
    provenance: extended_v2
    moment: mattino
    location:
      id: pontile_bocca
      qualifier: passaggio_verso_riva_interna_ovest_fiume
    characters_present: [bartolo, gabriel, elias, noah]
    focal_action: "Bartolo è nella barca, occhi aperti. I tre passano sul Pontile. Bartolo alza la mano. La mano resta a metà, ricade. I fratelli salutano con un cenno, non si fermano."
    focal_object: null
    atmosphere: "Pontile umido di brina, barca con coperta marrone, guscio dietro come schienale, mano alzata che ricade quando i fratelli sono oltre, passo regolare, nessuna parola, foglie autunnali galleggianti vicino al palo"
    palette: "verde-mare antico dei vestiti di Bartolo, marrone della coperta, nero lucido del guscio, ocra del legno del Pontile, blu-grigio dell'acqua della Bocca, giallo-bruno delle foglie galleggianti, viola-rosa pallido del cielo basso a est"
    wind_visible: vento_intreccio
    onomatopee: []
    composition_zone: ground_space
    notes: "Quarto cammeo Bartolo (s07→s10→s11→s12), modo canonico «fa» silenzioso. Mano a metà che ricade — gesto chiave. Apre porta Fase F oltre il mare (mai dichiarato). I fratelli proseguono verso nord risalendo la riva interna ovest del Fiume."

  - hook_id: s12_h04
    type: atmosferico
    is_signature: false
    provenance: extended_v2
    moment: mezzogiorno
    location:
      id: guado_di_pietre_piatte
      qualifier: tappa_di_passaggio_when_water_trembles_2_di_2
    characters_present: [gabriel, elias, noah]
    focal_action: "I fratelli si fermano un secondo sul guado. Sulla superficie dell'acqua, una piccola increspatura va contro la corrente, dentro il flusso. Loro la vedono. Non la nominano. Riprendono."
    focal_object: null
    atmosphere: "pietre piatte affioranti, acqua che scende, piega lieve controcorrente che non rompe il flusso, fiato lieve dei tre, Orti del Cerchio quasi spogli sull'altra riva, zolle nere di pioggia, niente uccelli acquatici"
    palette: "grigio chiaro delle pietre piatte, blu-verde freddo dell'acqua, bianco minimo della schiuma controcorrente, riflesso del cielo autunnale chiaro, giallo-bruno delle foglie sulla riva, marrone scuro delle zolle degli Orti dietro"
    wind_visible: vento_intreccio
    onomatopee: []
    composition_zone: fog_space
    notes: "When_water_trembles 2/2 saga (quota chiusa). Pattern A in miniatura (l'increspatura non rompe il flusso) — mai nominato. Nessuna reazione dei fratelli, solo vista di passaggio. Tipografia: nessuna parola, l'immagine basta. Atmosferico forte, NON signature (riservate ai 3 culmini h02/h05/h08)."

  - hook_id: s12_h05
    type: introspettivo
    is_signature: true
    provenance: extended_v2
    moment: pomeriggio
    location:
      id: burrone
      qualifier: cengia_grunto_pomeriggio_inoltrato
    characters_present: [grunto, gabriel, elias, noah]
    focal_action: "Gabriel posa la pagnotta sulla pietra piatta. Grunto annusa, mastica. Noah dice: «Buono?» Grunto: «Buono.» Poi guarda lontano: «Una volta era diverso. Suonavano in tre, erano tre persone.»"
    focal_object: pagnotta_forno
    atmosphere: "sole alto sui fianchi di Grunto, cicatrice chiara sulla spalla ben visibile, pagnotta tiepida sulla pietra, sguardo di Grunto che non guarda i fratelli ma lontano, frammento detto a se stesso o a chi non c'è più, fratelli fermi"
    palette: "verde-scuro lichene della cengia, grigio-pietra del Burrone, marrone-bruno del manto di Grunto, bianco sporco della cicatrice, oro pallido della pagnotta, ocra dell'erba secca della cengia, sagome dei tre fratelli un passo indietro"
    wind_visible: null
    onomatopee: []
    composition_zone: corner_lower_left
    notes: "HOOK FIRMA. Frammento pre-Vento unico saga (1 di 2 budget utilizzato). Scambio «Buono?/Buono.» rovesciato S1→S12 (Noah parla per primo). Grunto guarda lontano, soggetto sparito (vincolo: mai nomi propri Ariete/Ondina/Tempesta nel frammento). La coda originale del frammento «non tre venti» è espressa visivamente da h08 (Concerto), qui omessa per limite parola. Pagnotta callback s01."

  - hook_id: s12_h06
    type: transizione
    is_signature: false
    provenance: extended_v2
    moment: pomeriggio
    location:
      id: burrone
      qualifier: cengia_ripida_che_sale_verso_roccia_alta
    characters_present: [gabriel, elias, noah]
    focal_action: "I tre salgono la cengia ripida. In qualche punto usano le mani. Mezz'ora di salita silenziosa. Grunto è già rientrato nella grotta dietro di loro."
    focal_object: null
    atmosphere: "cengia stretta di pietra grigia, appigli a tratti, fiato corto, ombra della parete a sinistra, sole obliquo a destra che taglia la roccia, sagome piccole dei fratelli che salgono in fila"
    palette: "grigio chiaro della pietra del Burrone, marrone-bruno della cengia, bordeaux della maglia di Gabriel davanti, ocra-marrone della maglia di Elias, marrone chiaro di Noah ultimo, blu-azzurro del cielo che si vede oltre il bordo, ombra blu fonda della parete"
    wind_visible: vento_intreccio
    onomatopee: []
    composition_zone: side_space
    notes: "Pattern A laterale: la cengia non è indicata, i fratelli la prendono perché sanno (Pattern A 'le cose si fanno senza chiedere'). Grunto offscreen rientrato, mai più visto saga."

  - hook_id: s12_h07
    type: panorama
    is_signature: false
    provenance: extended_v2
    moment: pomeriggio
    location:
      id: roccia_alta
      qualifier: poggio_piatto_sopra_burrone_arrivo_e_seduta_sul_bordo
    characters_present: [gabriel, elias, noah]
    focal_action: "I tre si siedono sul bordo di Roccia Alta. Piedi che ciondolano nel vuoto. Elias a sinistra, Noah al centro, Gabriel a destra. Niente parole."
    focal_object: null
    atmosphere: "piattaforma di pietra grigia con ciuffi di erba secca tra le crepe, isola intera leggibile in basso (Foresta a ovest, Orti a nord-ovest, Villaggio al centro col fumo del Forno sottile, Pontile a sud, Bocca, mare aperto su tre lati), Montagne Gemelle alle spalle vicinissime"
    palette: "grigio chiaro della pietra, ocra dell'erba secca, verde-marrone della Foresta lontana, giallo-marrone degli Orti quadrati, terracotta dei tetti del Villaggio in miniatura, bianco sottile del fumo del Forno, blu-grigio del mare su tre lati, grigio scuro delle Montagne Gemelle dietro"
    wind_visible: null
    onomatopee: []
    composition_zone: sky_space
    notes: "Panorama-architrave saga. Disposizione fratelli alla lettera (Elias-Noah-Gabriel). Cartografia leggibile: tutti i quartieri visibili insieme — unico hook saga in cui l'isola è intera nel quadro. Vento ancora 'ordinario' — il Concerto comincia in h08. Tipografia minima."

  - hook_id: s12_h08
    type: atmosferico
    is_signature: true
    provenance: extended_v2
    moment: pomeriggio_inoltrato
    location:
      id: roccia_alta
      qualifier: concerto_tre_venti_insieme_unicum_saga
    characters_present: [gabriel, elias, noah]
    focal_action: "Da est arriva il Taglio. Da ovest l'Intreccio porta foresta. Da sud il Mulinello gira e porta sale. Sopra Roccia Alta soffiano insieme. L'aria è piena dell'isola intera."
    focal_object: null
    atmosphere: "tre correnti che convergono sopra il poggio senza annullarsi, pieno d'aria, odori sovrapposti — vegetale di foresta, salato del mare, secco di est — fratelli seduti sul bordo, capelli mossi in tre direzioni leggermente diverse, sole basso pomeridiano dorato"
    palette: "azzurro-dorato del cielo pomeridiano, oro caldo della luce radente, grigio chiaro della pietra di Roccia Alta, sagome dei tre fratelli controluce sul bordo, sfumature verde-foresta a ovest, blu-mare a sud, bruno-est, bianco della luce alta che si fa densa"
    wind_visible: vento_taglio
    onomatopee: []
    composition_zone: sky_space
    notes: "HOOK FIRMA. Apice saga. Tutti e tre i venti visibili insieme — unicum saga, raro allineamento meteo (ARCHI 3.S12). Concerto NON è suono letterale: è aria piena, l'isola «come un corpo solo». Nessuna onomatopea (vincolo: il pieno è silenzioso, non rumoroso). Tipografia non grande. Bambino 4 sente l'aria, adulto coglie il sigillo. wind_visible riporta il vento dominante (Taglio); gli altri due (Intreccio + Mulinello) descritti in atmosphere e focal_action."

  - hook_id: s12_h09
    type: introspettivo
    is_signature: false
    provenance: extended_v2
    moment: pomeriggio_inoltrato
    location:
      id: roccia_alta
      qualifier: bordo_seduti_momento_soglia_terna_strato_3_tenere_zero_parole
    characters_present: [gabriel, noah, elias]
    focal_action: "Gabriel appoggia il palmo sulla pietra calda. Poco dopo Noah posa la sua mano sulla mano di Gabriel. Poi Elias appoggia il gomito sul braccio di Gabriel."
    focal_object: null
    atmosphere: "tre gesti irriflessi, sequenza minima, piedi nel vuoto sul bordo, sole basso pomeridiano caldo sulla pietra, Concerto continua attorno, paura di Gabriel intera che non si scioglie, gesto che è risposta non soluzione"
    palette: "grigio caldo della pietra di Roccia Alta scaldata dal sole, oro tardo del pomeriggio, bordeaux della maglia di Gabriel, ocra-marrone della manica di Elias, marrone della mano piccola di Noah, sagome di tre quarti dei fratelli di lato, viola tenue dell'orizzonte sud"
    wind_visible: vento_intreccio
    onomatopee: []
    composition_zone: vignette
    notes: "Architrave saga zero-parole. Terza parola terna strato 3 dire/accettare/tenere — Gabriel TENERE, curva 5/2/0 chiusa (Noah s10 cinque, Elias s11 due, Gabriel s12 zero). Il gesto è il libro che chiude. Close-up basso sulle tre mani/gomito sulla pietra — viso di Gabriel non in primo piano, taglio della spalla. Vincolo voce: nessuna didascalia, nessun pensiero attribuito. NON signature ma momento-soglia centrale, riservata la signature di chiusura ad h08 (apice atmosferico) e h02 (sguardo Fiamma)."

  - hook_id: s12_h10
    type: interno
    is_signature: false
    provenance: extended_v2
    moment: sera
    location:
      id: forno
      qualifier: tavolo_piccolo_quattro_sedie_chiusura_saga_braccialetto_al_polso
    characters_present: [fiamma, gabriel, elias, noah]
    focal_action: "Fiamma taglia il dolce in quattro fette uguali e si siede al tavolo. Versa l'infuso: «Domani brina.» Gabriel prende una briciola dal piatto di Noah col dito."
    focal_object: braccialetto_s9
    atmosphere: "tavolo piccolo accanto alla porta, quattro sedie, candela ferma sul tavolo, dolce normale tagliato in quattro, tazze fumanti, Noah con le gambe che dondolano dalla sedia, Elias mastica piano, Gabriel ha al polso destro il braccialetto di Noah — castagna ora rugata — visibile appena nella luce della candela, Piazza vuota fuori la finestra, blu-nero di notte piena"
    palette: "giallo caldo della candela, terracotta del Forno spento ma ancora tiepido, bordeaux della maglia di Gabriel, ocra-marrone delle sagome dei fratelli, blu-nero della finestra, verde scuro del braccialetto col marrone rugato della castagna ai bordi, bianco del vapore delle tazze, marrone scuro del legno del tavolo"
    wind_visible: vento_mulinello
    onomatopee: []
    composition_zone: vignette
    notes: "Sigillo saga ad anello con s12_h01 (Forno apre, Forno chiude). Quattro fette uguali — bloom silenzioso fette_uguali (Fiamma fa al posto del fratello grande, eco s09). Fiamma siede a tavola coi fratelli — prima volta saga. Frase alla lettera: «Domani brina.» Gesto antico Gabriel-briciola-piatto-di-Noah preservato. Braccialetto al polso destro, castagna rugata (memento mori stagionale, debt_s09_to_s12 chiuso). NESSUNA key_phrase di sigillo: il sigillo è IMMAGINE, non frase (ARCHI 3.S12). Mulinello cala fuori, l'anno è finito."
