    priority: medium
  - object: radice_ponte
    note: "La radice ad arco 'come un ponte basso' e il ramo basso curvato sul sentiero sono dettagli-mondo candidati Tier A della Foresta (tornano? verificare nelle storie successive)"
    priority: low
