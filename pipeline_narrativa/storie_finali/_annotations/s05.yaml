sid: s05
title: Il Ponte di Rami
note: |
  Annotazioni operative per ogni hook (ground truth dalla prosa, sovrascrivono il NER fuzzy).
  Per ogni hook narrativo (h01..h10):
  - location: id luogo canonico DOVE SUCCEDE LA SCENA (1 solo, deve esistere in entities.locations)
  - characters_in_scene: personaggi fisicamente in scena (id da entities.characters)
  - characters_offscreen_or_distant: personaggi citati ma non in scena (es. sagome lontane, cammei sonori)
  - objects_in_scene: oggetti canonici visibili (id da entities.objects)
  - canonical_details: dettagli stabili (es. dettagli Tier A path_details, vincoli scena)
  - subhooks: lista sotto-hook se l'hook è splittato in più pagine libro (default: 1 sotto-hook = 1 pagina)
                Il campo page_book può essere int (1 pagina) o lista [N, N+1] per spread doppia.
  Le note subhook sono il BLOCCO SCENA del prompt illustratore: coprono beat, azione focale,
  inquadratura, varianti atmosferiche e continuità. NON ripetono stile (stylesheet), tratti
  fisici (schede + scale GU) né firme ambientali (prompt_grok). La quiet zone alta (~25-30%
  per il testo di pagina) è vincolo dello stylesheet e vale per ogni scena.

book_pages_total: 19

hooks:

  s05_h01:
    location: foresta_intrecciata
    location_variant: interno_primavera_piena
    characters_in_scene: [bru, gabriel, elias, noah]
    characters_offscreen_or_distant: []
    objects_in_scene: []
    canonical_details:
      - "Qualche settimana dopo s04: primavera piena, il sole scalda la pelle"
      - "CALLBACK cb_s05_001: Bru guida — in s04 aveva indicato col mento una direzione; ora li porta. «Sceglie una direzione che da soli non sarebbe venuta in mente.» I tre si fidano e camminano dietro (seed_bru_sa_indicare_luoghi)"
      - "Bru non si volta mai: quattro in fila, lui davanti"
      - "Dettagli Tier A lungo il cammino: il sasso di soglia (s03), e dopo, il mucchio di pigne ammassato — Bru ci passa accanto «come si passa accanto a una casa conosciuta»"
      - "Vento Intreccio sopra le chiome: in basso quasi non si sente"
    subhooks:
      - id: s05_h01a
        page_book: 1
        text_split_marker: "Qualche settimana dopo"
        image_status: TBD
        note: "La fila dietro Bru: il tassino davanti, deciso, senza voltarsi; i tre fratelli in fila dietro di lui tra i tronchi, nella luce calda di primavera piena. Il rovesciamento è il soggetto: il più piccolo guida, i bambini si fidano. Andatura tranquilla, fiducia leggibile nei corpi."
      - id: s05_h01b
        page_book: 2
        text_split_marker: "Venti minuti, forse trenta"
        image_status: TBD
        note: "Il cammino con i segni: la Foresta che si apre e si richiude; sul lato, riconoscibili, il sasso di soglia (s03) e il mucchio di pigne ammassato — la 'casa conosciuta' di Bru, che ci passa accanto senza fermarsi. Pagina-caccia: il bambino ritrova i dettagli delle storie passate. L'Intreccio in alto tra le chiome, appena suggerito."

  s05_h02:
    location: torrente_affluente_foresta
    location_variant: sponda_lato_orti_acqua_alta
    characters_in_scene: [gabriel, elias, noah, bru, mantenitori]
    characters_offscreen_or_distant: []
    objects_in_scene: []
    canonical_details:
      - "Il torrente gonfio di neve sciolta dalle Gemelle: acqua che corre alta, quattro o cinque metri di luce fino all'altra sponda. Di là un sentiero comincia; di qua niente"
      - "Il segno dell'assenza: sulla pietra in riva, il cerchio di muschio dove poggiava il vecchio tronco-ponte portato via dalla piena"
      - "Cornice s05_c1: più a monte, su un'ansa, una mantenitrice (donnola) su una scaletta a pioli ripara una passerella; un TOK breve di corda contro legno; i fratelli annuiscono. Mantenitori: figure collettive, mai individuate. Appare SOLO nel subhook b"
      - "Bru si ferma un passo indietro: ha portato, ora osserva"
    subhooks:
      - id: s05_h02a
        page_book: 3
        text_split_marker: "Arrivano al torrente"
        image_status: TBD
        note: "L'ostacolo: i tre e Bru fermi sulla sponda, il torrente largo e veloce davanti (acqua di neve, riflessi freddi nel verde di primavera), l'altra riva col sentiero che comincia — irraggiungibile. In primo piano sulla pietra di riva il cerchio di muschio vuoto: la forma del ponte che non c'è più. L'assenza resa visibile."
      - id: s05_h02b
        page_book: 4
        text_split_marker: "Più a monte, su un'ansa"
        image_status: TBD
        note: "Cameo della mantenitrice: più a monte, in distanza sull'ansa, una donnola al lavoro su una scaletta a pioli contro una passerella — figura piccola, operosa, non individuata. I quattro in basso che guardano e annuiscono. Il mondo che ripara se stesso: prepara l'idea (se loro riparano, possiamo costruire anche noi)."

  s05_h03:
    location: foresta_intrecciata
    location_variant: tra_torrente_e_margine_orti
    characters_in_scene: [gabriel, elias, noah, bru]
    characters_offscreen_or_distant: [nodo]
    objects_in_scene: []
    canonical_details:
      - "Onomatopea firma: TOK-TOK-TOK, pausa, TOK-TOK-TOK — tre colpi secchi attraverso le chiome, «un ritmo che riconoscono». L'Intreccio lo porta dritto, senza sbavature (contrasto con s04: il vento che là scompigliava le voci qui consegna il suono giusto)"
      - "«Nessuno dice il nome. Nessuno deve.» Nodo non si vede ancora: solo il suono. Cinquanta metri"
      - "VINCOLO: Nodo NON appare in questa pagina — page-turn verso h04"
      - "Onomatopee: resa tipografica del compositore, mai testo nell'immagine"
    subhooks:
      - id: s05_h03a
        page_book: 5
        text_split_marker: "Stanno per dire che si torna"
        image_status: TBD
        note: "Il richiamo: i quattro a testa alta, fermi, gli sguardi tutti nella stessa direzione tra le chiome — da dove arriva il suono. Niente fonte visibile: solo la direzione condivisa dei quattro corpi e la luce tra gli alberi. L'Intreccio in alto che 'porta dritto'. Pagina di ascolto e riconoscimento, sospesa sul page-turn."

  s05_h04:
    location: foresta_intrecciata
    location_variant: margine_lato_orti_presso_scaletta
    characters_in_scene: [nodo, gabriel, elias, noah, bru]
    characters_offscreen_or_distant: []
    objects_in_scene: [corda_nodo]
    canonical_details:
      - "PRIMA APPARIZIONE DI NODO (gallo, cresta rossa): accosciato sulla scaletta dei Coltivatori, «la cresta rossa si vede da prima di vederlo intero», la matassa di corda chiara al braccio"
      - "Il gesto-firma di Nodo: finisce il giro di nodo, tira, verifica — SOLO ALLORA alza la testa. «Cosa vi serve.»"
      - "Elias spiega: il torrente, il tronco che non c'è più, l'idea delle pertiche di rami caduti. Nodo annuisce mentre ascolta, non dice niente"
      - "I fratelli si fermano a un passo e ASPETTANO: il rispetto del lavoro altrui"
    subhooks:
      - id: s05_h04a
        page_book: 6
        text_split_marker: "Nodo è accosciato sulla scaletta"
        image_status: TBD
        note: "L'apparizione di Nodo: la cresta rossa per prima cosa — lui accosciato sulla scaletta, concentrato sul nodo tra le mani, la matassa di corda chiara al braccio, la testa bassa sul lavoro. I quattro fermi a un passo, in attesa rispettosa, nessuno che interrompe. Il ritratto del maestro che non sa di esserlo."
      - id: s05_h04b
        page_book: 7
        text_split_marker: "Nodo finisce il giro"
        image_status: TBD
        note: "Il dialogo: Nodo che ha appena alzato la testa (il lavoro finito e verificato), lo sguardo dritto sui fratelli — «Cosa vi serve.» Elias un mezzo passo avanti che spiega, le mani che disegnano l'idea (il torrente, le pertiche). Gli altri dietro. Scambio asciutto tra chi chiede bene e chi ascolta sul serio."

  s05_h05:
    location: foresta_intrecciata
    location_variant: margine_lato_orti_presso_scaletta
    characters_in_scene: [nodo, elias]
    characters_offscreen_or_distant: [gabriel, noah, bru]
    objects_in_scene: [corda_nodo]
    canonical_details:
      - "SCENA-CUORE pedagogica (seed_nodo_marinaro_capacita_elias): Nodo misura la corda tra le dita, la taglia con un colpo secco di lama, la porge a Elias"
      - "Il marinaro mostrato UNA VOLTA SOLA, lentamente: il giro intorno alla pertica, il passaggio sotto, la mezza chiave finale. «Adesso fai tu.»"
      - "Poi torna alla scaletta e riprende il TOK-TOK-TOK: la lezione è finita, la fiducia è data"
      - "Inquadratura canonica: le MANI — di Nodo che mostra, di Elias che riceve"
    subhooks:
      - id: s05_h05a
        page_book: 8
        text_split_marker: "Quando Elias finisce"
        image_status: TBD
        note: "La lezione del marinaro: primo piano sulle mani — Nodo che mostra il nodo lentamente sulla corda chiara (il giro, il passaggio, la mezza chiave), Elias vicinissimo che guarda con tutta l'attenzione del mondo, le mani già pronte a ricevere. Una volta sola: la solennità tranquilla dell'insegnare. Gli altri fuori fuoco o fuori campo."

  s05_h06:
    location: foresta_intrecciata
    location_variant: tra_torrente_e_alberi_caduti
    characters_in_scene: [bru, noah]
    characters_offscreen_or_distant: [gabriel, elias]
    objects_in_scene: []
    canonical_details:
      - "La raccolta: i rami che la Foresta ha lasciato cadere d'inverno, «adesso servono» (seed_pattern_a_rami_caduti)"
      - "Bru selezionatore: si ferma davanti a un ramo caduto, lo indica col muso, riparte; un altro, riparte ancora"
      - "La gag gentile: Noah solleva un rametto sottile, lo scuote, «Anche questo è grosso!» — non lo è. Bru passa oltre senza guardarlo. Noah lo lascia cadere e prende quello giusto"
      - "Correzione senza parole: nessuno sgrida, l'esempio basta"
    subhooks:
      - id: s05_h06a
        page_book: 9
        text_split_marker: "Tornano al torrente"
        image_status: TBD
        note: "La squadra al lavoro: Bru col muso puntato su un ramo caduto degno, Noah in corsa felice con già una pertica in spalla o tra le braccia («Questo! E questo!»). Energia da raccolto, sottobosco di primavera con rami d'inverno a terra. Il piccolo che indica e il bambino che esegue: la coppia comica e seria insieme."
      - id: s05_h06b
        page_book: 10
        text_split_marker: "Non lo è"
        image_status: TBD
        note: "La correzione muta: Noah col suo rametto sottile e ridicolo a mezz'aria, lo sguardo su Bru — che gli passa oltre, già rivolto a un ramo serio, senza degnare il rametto. Il momento esatto in cui Noah capisce e lo lascia cadere. Commedia minima e dignitosa: si impara guardando."

  s05_h07:
    location: torrente_affluente_foresta
    location_variant: sponda_lato_orti_costruzione
    characters_in_scene: [elias, gabriel, noah, bru]
    characters_offscreen_or_distant: []
    objects_in_scene: [corda_nodo]
    canonical_details:
      - "Quattro pertiche posate parallele da sponda a sponda"
      - "Elias e il nodo: sbaglia, scioglie, riprova, sbaglia di nuovo, alla TERZA riesce — il giro, il passaggio, la mezza chiave. Tira. Tiene"
      - "I ruoli: Gabriel tiene ferme le pertiche (il legno scivola sul muschio) — «Tienile più strette.» «Le tengo.»; Noah porta la corda nuova; Bru recupera un pezzo di corda finito in acqua e lo riporta, poi torna a sedersi"
      - "Sopra le chiome l'Intreccio muove le foglie; sotto, il torrente liscio"
    subhooks:
      - id: s05_h07a
        page_book: 11
        text_split_marker: "Quattro pertiche, posate parallele"
        image_status: TBD
        note: "Il nodo che non viene: Elias chino sulla prima legatura, la corda imbrogliata tra le dita, la concentrazione e la frustrazione trattenuta; Gabriel accanto che tiene ferme le pertiche sul muschio della sponda. Il fallimento operoso, terzo tentativo in arrivo. Le quattro pertiche già stese sull'acqua: il ponte che esiste a metà."
      - id: s05_h07b
        page_book: 12
        text_split_marker: "Gabriel tiene ferme le pertiche"
        image_status: TBD
        note: "La squadra completa: composizione corale sulla sponda — Gabriel piegato a tenere strette le pertiche, Elias che lega (ora il nodo tiene), Noah che arriva di corsa con la corda nuova, e Bru che esce dall'acqua bassa riportando il pezzo di corda recuperato. Quattro lavori diversi, un solo ponte. L'Intreccio sopra le chiome, il torrente liscio sotto."

  s05_h08:
    location: torrente_affluente_foresta
    location_variant: sul_ponte_collaudo
    characters_in_scene: [elias, gabriel, noah, bru]
    characters_offscreen_or_distant: [nodo, pun, memolo]
    objects_in_scene: []
    canonical_details:
      - "Nodo guarda il ponte da lontano per un secondo, non si muove: «È vostro. Provatelo voi.» Poi torna al lavoro (seed_elias_collauda_per_primo_responsabilita)"
      - "L'ordine dei passaggi: Elias primo (braccia un po' aperte, le pertiche vibrano, reggono), Noah secondo (più leggero), Gabriel terzo (cigolano al centro, reggono), Bru quarto e ultimo — «una specie di cortesia»"
      - "Cornice s05_c2 (INTERMEZZO a montaggio parallelo, davanti al Forno): Pun sistema la sciarpa di Mèmolo che gli era andata storta; Mèmolo lo lascia fare e gli tocca la testa con la zampa. Stabilisce il legame padre-figlio, pre-installa s06. SOLO nel subhook c"
      - "Vincolo: l'intermezzo è un cambio di scena totale (piazza/Forno), poi si torna al ponte"
    subhooks:
      - id: s05_h08a
        page_book: 13
        text_split_marker: "Quando il ponte è finito"
        image_status: TBD
        note: "Il permesso: i quattro davanti a Nodo, che alza appena la testa dal lavoro guardando il ponte in distanza — il gesto minimo di chi approva senza cerimonie («È vostro. Provatelo voi»). Tensione buona: il verdetto del maestro che restituisce l'opera ai suoi autori."
      - id: s05_h08b
        page_book: 14
        text_split_marker: "Elias passa per primo"
        image_status: TBD
        note: "Il collaudo di Elias — pagina-icona: lui solo a metà del ponte di pertiche, le braccia un po' aperte per l'equilibrio, l'acqua che corre sotto, gli altri tre e Bru sulla sponda che guardano. Le pertiche che vibrano appena. Chi ha fatto, prova per primo: la responsabilità come onore. Reggono."
      - id: s05_h08c
        page_book: 15
        text_split_marker: "Davanti al Forno, intanto"
        image_status: TBD
        note: "INTERMEZZO al villaggio (cambio scena totale): davanti al Forno, Pun il riccino in punta di zampe che sistema la sciarpa storta di Mèmolo — tira un capo, poi l'altro; Mèmolo fermo che lo lascia fare, la zampa che si posa sulla testa del figlio. Tenerezza minuta, vapore di pane sullo sfondo. Mentre nel bosco si collauda, in piazza ci si prende cura: il montaggio parallelo prepara s06."
      - id: s05_h08d
        page_book: 16
        text_split_marker: "Noah passa per secondo"
        image_status: TBD
        note: "Gli altri passaggi: ritorno al ponte — Noah leggero quasi a metà corsa, Gabriel dietro più cauto dove le pertiche cigolano, e Bru ultimo, quattro zampe delicate sul ponte fatto da loro: la cortesia dell'ospite. Sequenza leggibile in un'unica scena (tre punti del ponte) o col fuoco su Bru che chiude la fila. Il ponte funziona per tutti."

  s05_h09:
    location: radura_dei_pini
    location_variant: interno_cerchio_erba
    characters_in_scene: [bru, gabriel, elias, noah]
    characters_offscreen_or_distant: []
    objects_in_scene: []
    canonical_details:
      - "La meta segreta di Bru (seed_radura_coi_pini_luogo_silenzioso): cento-centocinquanta metri oltre il ponte"
      - "La radura: un cerchio d'erba, pini alti e dritti intorno, la luce che cade VERTICALE tra le chiome, l'erba sotto quasi gialla"
      - "Il rito: Bru entra per primo e si siede al centro; i tre si siedono in cerchio intorno a lui. «Nessuno parla. Restano un po'.»"
      - "Stessa radura di s02 h09 (margine, coi Pastori): qui vista dall'interno, cuore del cerchio"
    subhooks:
      - id: s05_h09a
        page_book: 17
        text_split_marker: "Camminano cento, centocinquanta metri"
        image_status: TBD
        note: "La radura — pagina-icona della storia: il cerchio d'erba quasi gialla nella luce verticale, i pini alti tutt'intorno come colonne, Bru seduto esatto al centro e i tre fratelli seduti in cerchio intorno a lui. Composizione centrata, quasi sacrale e però domestica: il premio del viaggio è un posto dove stare zitti insieme. Vista leggermente alta per leggere il cerchio."

  s05_h10:
    location: torrente_affluente_foresta
    location_variant: sponda_lato_orti_sera
    characters_in_scene: [gabriel, elias, noah, bru]
    characters_offscreen_or_distant: [nodo]
    objects_in_scene: []
    canonical_details:
      - "Il ritorno: riattraversano il ponte nello stesso ordine"
      - "Nodo se n'è andato; della scaletta dei Coltivatori, niente. Il TOK-TOK-TOK arriva da molto lontano, da un'altra parte della Foresta: «Non è venuto a vedere il collaudo finale. Non gli serviva.»"
      - "Chiusura canonica: «Il ponte è ancora lì.» — key phrase della storia: non hanno trovato qualcosa, hanno fatto qualcosa che resta"
    subhooks:
      - id: s05_h10a
        page_book: 18
        text_split_marker: "Tornano. Riattraversano il ponte"
        image_status: TBD
        note: "Il maestro andato: i quattro appena scesi dal ponte sulla sponda di partenza, lo spazio dove stava Nodo vuoto — niente scaletta, niente corda, solo il punto dove lavorava. Le teste girate verso il TOK-TOK-TOK lontanissimo, da un'altra parte della Foresta. L'assenza che è fiducia: non gli serviva controllare."
      - id: s05_h10b
        page_book: 19
        text_split_marker: "Il ponte è ancora lì"
        image_status: TBD
        note: "Chiusura quasi-muta: il ponte di pertiche da solo, vuoto, nella luce che cala — i quattro nodi di corda chiara ben visibili, l'acqua che corre sotto, nessuno in scena (o i quattro piccolissimi che si allontanano in fondo). La cosa fatta che resta. Eco delle chiusure di volume: qui non un vento, ma un'opera."

