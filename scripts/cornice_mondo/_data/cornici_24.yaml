    what: "Sagoma con carriola di vimini che attraversa la piazza vuota da est a ovest, prima che il villaggio si svegli."
    saluto: true
    formula_applicata: false
    visibility: visto_da_lontano_durante_uscita_dal_forno
    intensity: low
    proposed_text: "Sulla piazza, una sagoma con una carriola di vimini attraversò da est a ovest. Una mano si staccò dal manico, salì, ricadde. Gabriel alzò la sua. La carriola passò."
    structural_role: apertura_giro_d_pre_alba
    quote_tracker_impact: null
